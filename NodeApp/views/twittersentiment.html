<!DOCTYPE html>
<html lang="en" ng-app="angularjsNodejsTutorial">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tennis Predictor</title>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/angular.js/1.4.2/angular.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <script src="javascripts/app.js" type="text/javascript"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- Custom styles for this template-->
    <link href="/stylesheets/common.css" rel="stylesheet">
    <!-- Include your custom css file here if you're making one -->
  </head>

  <body style="overflow: hidden;">
    <!-- Navbar -->
    <nav role="navigation">
      <div id="menuToggle">
        <!--
        A fake / hidden checkbox is used as click reciever,
        so you can use the :checked selector on it.
        -->
        <input type="checkbox" />
        
        <span></span>
        <span></span>
        <span></span>
        
        <ul id="menu">
          <a href="/twittersentiment"><li>Fan Favorites</li></a>
          <a href="/headtohead"><li>Head to Head</li></a>
          <a href="/playerpage"><li>Player Info</li></a>
          <a href="/tournament"><li>Tournament</li></a>
        </ul>
      </div>
    </nav>
    <!-- Sample Content. You can either use this or make your own -->
    <div class="user-container myrow" ng-controller="twitterController">
      <div class="contentBlock column_left">  
        <form ng-submit="getSentiments()">
          <h6>Sentiment Evolution</h6>
          <label> Player <br>  
          <select name="Player" ng-model="playername" ng-options="x for x in availableTwitterPlayers">
          </select>
          </label>
          <br>
          <label> Start Year <br> 
          <select name="StartYear" ng-model="startyear">
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
            <option value="2013">2013</option>
            <option value="2012">2012</option>
            <option value="2011">2011</option>
            <option value="2010">2010</option>
            <option value="2009">2009</option>
            <option value="2008">2008</option>
            <option value="2007">2007</option>
          </select> </label>

          <br>
          <label> Start Month <br> 
          <select name="StartMonth" ng-model="startmonth">
            <option value="1">January</option>
            <option value="2">Febuary</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select></label>
          <!-- <input type="text" ng-model="startmonth"/> -->
          <br>
          <label> End Year <br> 
          <select name="EndYear" ng-model="endyear">
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
            <option value="2014">2014</option>
            <option value="2013">2013</option>
            <option value="2012">2012</option>
            <option value="2011">2011</option>
            <option value="2010">2010</option>
            <option value="2009">2009</option>
            <option value="2008">2008</option>
            <option value="2007">2007</option>
          </select> </label>

          <br>
          <label> End Month <br> 
          <select name="EndMonth" ng-model="endmonth">
            <option value="1">January</option>
            <option value="2">Febuary</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select> </label>
          <!--<label> Start Date <input type="month" max="2019-04" min="2010-01"/> <input type="text" ng-model="endyear"/> </label>
          <label> End Date <input type="month" max="2019-04" min="2010-01" placeholder="2019-04"/> </label>-->
          <br> <br>
          <input type="submit" value="Submit">  
        </form>
      </div>
      <div class="contentBlock column_right" >
        <div style="margin:auto; height:100%; padding-top:30%; display: block;" id="loaderwrapper">
        <div class="loader" id="loader" style="display: none;margin:auto;"></div> </div>
        <div id="twittergraph" style="display: none;">
          <h4> Sentiment analysis for tweets about: {{ saveplayername }}</h4>
          <h4> {{savestartmonth}}/{{savestartyear}} - {{saveendmonth}}/{{saveendyear}}</h4>
          <div id="plotlydiv"><!-- Plotly chart will be drawn inside this DIV --></div>
        </div>
      </div>
    </div>

    <!-- Include these before the end of body tag in every HTML file -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js" integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js" integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k" crossorigin="anonymous"></script>
  </body>

</html>
